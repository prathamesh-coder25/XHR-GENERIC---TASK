
<!DOCTYPE html>
<html>
<head>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
   <link rel="stylesheet" href="./assets/css/style.css">
   <title>XHR Generic</title>
 </head>
 <body>
  
<div class="container">
  <div class="row">
     <div class="col-md-6 offset-md-3 mb-4">
       <div class="card">
        <div class="card-body">
          <form id="postform">
            <div class="form-group">
              <label for="title">Title</label>
             <input type="text" required id="title" class="form-control">
            </div>

            <div class="form-group">
              <label for="body">Description</label>
              <textarea id="body" required class ="form-control" rows="4"></textarea>
            </div>

            <div class="form-group">
              <label for="userId"  >USER ID:</label>
              <select id="userId" class="form-control">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>

              </select>
            </div>
            <button class="btn btn-primary btn-block" id="addbtn">ADD POST</button>
            <button type="button" class="btn btn-primary btn-block d-none" id="updatebtn">UPDATE POST</button>
          </form>
        </div>
       </div>

     </div>
  </div>



  <div class="row" id="postcontainer">
    <div class="col-12 col-sm-6 col-md-4 mb-4">
      <div class="card h-100">
        <div class="card-header">
          <h3 data-toggle="tooltip" data-placement="bottom" title="Lorem ipsum dolor sit amet.">Lorem ipsum dolor sit amet.</h3>
        </div>
        

        <div class="card-body">
          <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </div>

        <div class="card-footer d-flex justify-content-between">
          <button class="btn btn-sm btn-outline-primary">Edit</button>
          <button class="btn btn-sm btn-outline-danger">remove</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="spinner d-none" id="spinner">
  <div class="spinner-border" role="status">
  <span class="sr-only">Loading...</span>
</div>
</div>
   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
